name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src/bootstrap_doctor

      - name: Build distributions
        run: python -m build

      - name: Smoke test wheel
        run: |
          python -m venv /tmp/bootstrap-doctor-wheel-smoke
          /tmp/bootstrap-doctor-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/bootstrap-doctor-wheel-smoke/bin/bootstrap-doctor --version

      - name: Audit dependencies
        run: pip-audit . --skip-editable
